    <script>
    (function() {
        function isAmazonHost(hostname) {
            var host = (hostname || "").toLowerCase();
            return host === "amzn.to"
                || host === "a.co"
                || /(^|\.)amazon\.[a-z.]+$/.test(host);
        }
    
        function cleanText(value) {
            return (value || "").replace(/\s+/g, " ").trim().slice(0, 160);
        }
    
        function dataValue(element, names) {
            for (var i = 0; i < names.length; i += 1) {
                if (element.dataset && element.dataset[names[i]]) {
                    return element.dataset[names[i]];
                }
            }
            return "";
        }
    
        function closestDataValue(link, names) {
            var selector = names.map(function(name) { return "[data-" + name.replace(/[A-Z]/g, function(match) { return "-" + match.toLowerCase(); }) + "]"; }).join(",");
            var node = selector && link.closest ? link.closest(selector) : null;
            return node ? dataValue(node, names) : "";
        }
    
        function amazonProductId(url) {
            var path = decodeURIComponent(url.pathname || "");
            var match = path.match(/\/(?:dp|gp\/product|gp\/aw\/d|exec\/obidos\/ASIN)\/([A-Z0-9]{10})(?:[/?]|$)/i);
            if (match) {
                return match[1].toUpperCase();
            }
    
            var asin = url.searchParams.get("asin") || url.searchParams.get("ASIN");
            return /^[A-Z0-9]{10}$/i.test(asin || "") ? asin.toUpperCase() : "";
        }
    
        function productName(link) {
            var explicit = dataValue(link, ["productName", "product", "itemName"]) || closestDataValue(link, ["productName", "product", "itemName"]);
            if (explicit) {
                return cleanText(explicit);
            }
    
            var cta = link.closest ? link.closest(".affiliate-cta, .product-cta, .section-product-cta, tr, li") : null;
            var namedNode = cta ? cta.querySelector("[data-product-name], .affiliate-cta__name-link, strong, h2, h3, th") : null;
            return cleanText((namedNode && namedNode.textContent) || link.getAttribute("aria-label") || link.getAttribute("title") || link.textContent);
        }
    
        function placement(link) {
            var explicit = dataValue(link, ["affiliatePlacement", "placement"]) || closestDataValue(link, ["affiliatePlacement", "placement"]);
            if (explicit) {
                return cleanText(explicit);
            }
    
            if (link.closest) {
                if (link.closest(".affiliate-cta--hero")) return "hero_cta";
                if (link.closest(".affiliate-cta--mid")) return "mid_article_cta";
                if (link.closest(".affiliate-cta--post-editor")) return "post_editor_cta";
                if (link.closest(".affiliate-cta--verdict")) return "verdict_cta";
                if (link.closest(".affiliate-cta--context")) return "context_cta";
                if (link.closest(".affiliate-cta")) return "affiliate_cta";
                if (link.closest("table")) return "comparison_table";
                if (link.closest("header, .hero, .modern-hero")) return "hero";
            }
    
            return "amazon_link";
        }
    
        document.addEventListener("click", function(event) {
            var link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
            if (!link) {
                return;
            }
    
            var url;
            try {
                url = new URL(link.href, window.location.href);
            } catch (_) {
                return;
            }
    
            if (!isAmazonHost(url.hostname)) {
                return;
            }
    
            var payload = {
                site_host: window.location.hostname,
                page_path: window.location.pathname,
                page_title: document.title,
                affiliate_network: "amazon",
                merchant: "amazon",
                product_id: amazonProductId(url),
                product_name: productName(link),
                placement: placement(link),
                link_url: url.href
            };
    
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push(Object.assign({ event: "affiliate_click" }, payload));
            window.dataLayer.push(Object.assign({ event: "amazon_outbound_click" }, payload));
        }, true);
    })();
    </script>
    <title>{{ .Permalink }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
</head>
